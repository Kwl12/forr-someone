<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Fineshyt ✨ Pink & White Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #ffb7c5 0%, #ff9eb0 100%);
            font-family: 'Quicksand', 'Segoe UI', 'Comic Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            position: relative;
        }

        /* Dekorasi Love Pink & Putih */
        body::before {
            content: "🩷";
            font-size: 140px;
            position: fixed;
            bottom: 10px;
            left: 10px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            transform: rotate(-10deg);
        }

        body::after {
            content: "🤍";
            font-size: 110px;
            position: fixed;
            top: 20px;
            right: 20px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .badge {
            background: #fff0f3;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 28px;
            border-radius: 100px;
            box-shadow: 0 12px 24px rgba(255, 105, 130, 0.25);
            margin-bottom: 20px;
            backdrop-filter: blur(2px);
            border: 2px solid #ff88a1;
        }

        .badge span {
            font-size: 2.2rem;
        }

        .badge h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #c43a5c;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 0 #ffe0e6;
        }

        .tagline {
            background: #ffeef2;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: #e6647c;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .tagline i {
            font-style: normal;
            display: inline-block;
            animation: bounce 1.2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Grid Galeri */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 3rem;
        }

        .card {
            background: rgba(255, 245, 247, 0.9);
            backdrop-filter: blur(3px);
            border-radius: 42px;
            overflow: hidden;
            box-shadow: 0 20px 30px -12px rgba(180, 50, 70, 0.3);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 2px solid #ffe2e9;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.01);
            box-shadow: 0 28px 36px -12px #dd6b84;
            border-color: #ffb3c1;
        }

        .img-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #ffe2e9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .img-wrapper img {
            transform: scale(1.05);
        }

        .card-caption {
            padding: 1rem 1rem 1.3rem;
            text-align: center;
            background: #fffafc;
            border-top: 2px dashed #ffbfcc;
        }

        .card-caption p {
            font-weight: 700;
            color: #b13e5a;
            font-size: 1rem;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Modal / Lightbox */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 195, 210, 0.92);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            background: #fff9fb;
            border-radius: 56px;
            padding: 12px;
            box-shadow: 0 30px 45px rgba(150, 40, 60, 0.4);
            border: 4px solid #ff98af;
            position: relative;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-content img {
            border-radius: 48px;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 80vh;
            display: block;
            margin: 0 auto;
        }

        .close-modal {
            position: absolute;
            top: -18px;
            right: -18px;
            background: #ff6b8b;
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: 2px solid white;
        }

        .close-modal:hover {
            background: #c43a5c;
            transform: rotate(90deg);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            font-weight: 600;
            color: #fff1f4;
            text-shadow: 1px 1px 0 #c95c74;
            background: rgba(255, 130, 160, 0.3);
            border-radius: 80px;
            backdrop-filter: blur(4px);
            font-size: 0.9rem;
        }

        .footer span {
            font-size: 1.1rem;
        }

        @media (max-width: 620px) {
            body {
                padding: 1rem;
            }
            .gallery {
                gap: 1rem;
            }
            .badge h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="badge">
            <span>🩷</span>
            <h1>my fineshyt · pink & white</h1>
            <span>🤍</span>
        </div>
        <div class="tagline">
            🌸 pinky cute moments 🎀 &nbsp;&nbsp;🩷🤍🩷🤍
        </div>
    </div>

    <div class="gallery" id="galleryContainer">
        <div style="text-align: center; grid-column: 1/-1; padding: 40px;">🌸 loading fineshyt pictures ... 🩷🤍</div>
    </div>

    <div class="footer">
        <span>🩷🤍</span> every picture is my fineshyt · ෆ˙ᵕ˙ෆ  <span>🤍🩷</span><br>
        ✨ with love ✨
    </div>
</div>

<!-- Modal Lightbox -->
<div id="imageModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <img id="modalImage" src="" alt="my fineshyt">
    </div>
</div>

<script>
    // DAFTAR FOTO (8 gambar dari catbox)
    const imageUrls = [
        "https://files.catbox.moe/ayv722.jpg",
        "https://files.catbox.moe/2qwfxj.jpg",
        "https://files.catbox.moe/6jkw53.jpg",
        "https://files.catbox.moe/4cevpf.jpg",
        "https://files.catbox.moe/qgfvi3.jpg",
        "https://files.catbox.moe/jhqqdn.jpg",
        "https://files.catbox.moe/n00gdd.jpg",
        "https://files.catbox.moe/ai47hk.jpg"
    ];

    // Caption dengan love pink dan putih
    const cuteCaptions = [
        "🩷 my cutest fineshyt 🤍",
        "🤍 pink mood forever 🩷",
        "🩷 love this moment 🤍",
        "🤍 fineshyt era 🩷",
        "🩷🤍 forever 🩷🤍",
        "🤍 beautiful days 🩷",
        "🩷 my everything 🤍",
        "🤍🩷 always 🩷🤍"
    ];

    // render gallery
    function renderGallery() {
        const gallery = document.getElementById('galleryContainer');
        gallery.innerHTML = '';

        for (let i = 0; i < imageUrls.length; i++) {
            const url = imageUrls[i];
            const captionText = cuteCaptions[i % cuteCaptions.length];
            
            const card = document.createElement('div');
            card.className = 'card';
            
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'img-wrapper';
            const img = document.createElement('img');
            img.src = url;
            img.alt = `my fineshyt ${i+1}`;
            img.loading = "lazy";
            img.onerror = () => {
                img.src = "https://placehold.co/400x400/ffb7c5/ffffff?text=🩷+fineshyt+🤍";
                img.alt = "image not loaded";
            };
            imgWrapper.appendChild(img);
            
            const captionDiv = document.createElement('div');
            captionDiv.className = 'card-caption';
            captionDiv.innerHTML = `
                <p>
                    <span>🩷</span>
                    ${captionText}
                    <span>🤍</span>
                </p>
            `;
            
            card.appendChild(imgWrapper);
            card.appendChild(captionDiv);
            
            card.addEventListener('click', (function(imageUrl) {
                return function() {
                    openModal(imageUrl);
                };
            })(url));
            
            gallery.appendChild(card);
        }
    }
    
    // modal lightbox
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const closeModalBtn = document.querySelector('.close-modal');
    
    function openModal(imageSrc) {
        modal.style.display = 'flex';
        modalImg.src = imageSrc;
        document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = '';
        modalImg.src = '';
    }
    
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            closeModal();
        }
    });
    
    window.addEventListener('DOMContentLoaded', () => {
        renderGallery();
    });
</script>

</body>
</html>
